spring:
  application:
    name: student-feedback-lms
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/student_feedback_lms
    username: postgres
    password: monesh2357!
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false
  
  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
jwt:
  secret: your-256-bit-secret-key-change-this-in-production-please-make-it-secure
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days

# CORS Configuration
cors:
  allowed-origins: http://localhost:5173,http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.lms: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 30

# File Upload Configuration
spring.servlet.multipart:
  enabled: true
  max-file-size: 10MB
  max-request-size: 10MB
  file-size-threshold: 2KB

# Application Specific Configuration
app:
  upload:
    dir: uploads/
  badge:
    auto-award: true
  feedback:
    anonymous-tracing-role: ADMIN
  judge0:
    api-url: https://judge0-ce.p.rapidapi.com
    api-key: your-rapidapi-key-here
    api-host: judge0-ce.p.rapidapi.com

